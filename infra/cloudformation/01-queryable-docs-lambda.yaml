AWSTemplateFormatVersion: "2010-09-09"

# This stack creates the Lambda function used to fetch the list of queryable PDFs.
# It does NOT create the S3 bucket.
# It only gives the Lambda read access to the existing FAISS metadata files in S3.
Description: "Lambda for fetching queryable RAG PDFs from existing S3 FAISS metadata"

Parameters:
  BucketName:
    Type: String
    Default: "ayan-deaws-lab-600743178533"
    Description: "Existing S3 bucket that stores RAG outputs such as FAISS metadata."

  FaissMetadataPrefix:
    Type: String
    Default: "embeddings/faiss/"
    Description: "S3 prefix where *.metadata.json files are stored."

  LambdaFunctionName:
    Type: String
    Default: "rag-queryable-documents-lambda"
    Description: "Name of the Lambda function that returns queryable PDF metadata."

  LambdaRoleName:
    Type: String
    Default: "RagQueryableDocsLambdaRole"
    Description: "IAM role name used by the queryable documents Lambda."

  LambdaCodeS3Key:
    Type: String
    Default: "lambda-deploy/queryable_documents.zip"
    Description: "S3 key of the zipped Lambda deployment package."

Resources:
  # ============================================================
  # IAM Role for Lambda
  # ============================================================
  # Lambda cannot access AWS services directly unless it has an IAM role.
  # This role allows Lambda to:
  # 1. Write logs to CloudWatch.
  # 2. List objects under embeddings/faiss/.
  # 3. Read metadata JSON files from embeddings/faiss/.
  QueryableDocsLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref LambdaRoleName

      # Trust policy:
      # Allows the AWS Lambda service to assume this role.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole

      Policies:
        - PolicyName: "QueryableDocsLambdaS3ReadPolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Allows Lambda to write logs.
              # This helps us debug Lambda executions from CloudWatch Logs.
              - Sid: AllowCloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

              # Allows Lambda to list only the FAISS metadata prefix.
              # This is needed because Lambda must find all *.metadata.json files.
              - Sid: AllowListFaissMetadataPrefix
                Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${BucketName}"
                Condition:
                  StringLike:
                    s3:prefix:
                      - !Sub "${FaissMetadataPrefix}*"

              # Allows Lambda to read objects under embeddings/faiss/.
              # These are the metadata JSON files generated by the RAG processor.
              - Sid: AllowReadFaissMetadataObjects
                Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub "arn:aws:s3:::${BucketName}/${FaissMetadataPrefix}*"

  # ============================================================
  # CloudWatch Log Group
  # ============================================================
  # This explicitly creates the Lambda log group and keeps logs for 7 days.
  # Useful for POC cost control.
  QueryableDocsLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${LambdaFunctionName}"
      RetentionInDays: 7

  # ============================================================
  # Lambda Function
  # ============================================================
  # This Lambda reads FAISS metadata JSON files from S3 and returns them
  # as a list of queryable documents.
  #
  # Important:
  # The Python code is NOT embedded directly in this YAML.
  # It is expected to be zipped and uploaded to:
  # s3://<BucketName>/lambda-deploy/queryable_documents.zip
  QueryableDocsLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Role: !GetAtt QueryableDocsLambdaRole.Arn
      Timeout: 30
      MemorySize: 256

      # These environment variables are consumed inside lambda_function.py
      # using os.environ.get(...).
      Environment:
        Variables:
          BUCKET_NAME: !Ref BucketName
          FAISS_METADATA_PREFIX: !Ref FaissMetadataPrefix

      # CloudFormation will fetch the Lambda ZIP from S3.
      # Make sure the ZIP exists before deploying/updating this stack.
      Code:
        S3Bucket: !Ref BucketName
        S3Key: !Ref LambdaCodeS3Key

Outputs:
  # Exporting the function name helps humans and other stacks know
  # which Lambda was created.
  LambdaFunctionName:
    Description: "Queryable documents Lambda function name."
    Value: !Ref QueryableDocsLambda

  # Lambda ARN can be used by other CloudFormation stacks if needed.
  LambdaFunctionArn:
    Description: "Queryable documents Lambda ARN."
    Value: !GetAtt QueryableDocsLambda.Arn
    Export:
      Name: QueryableDocsLambdaArn

  LambdaRoleArn:
    Description: "IAM role ARN used by the Lambda function."
    Value: !GetAtt QueryableDocsLambdaRole.Arn