AWSTemplateFormatVersion: '2010-09-09'
Description: 'Lambda stack for RAG queryable documents'

Parameters:
  BucketName:
    Type: String
    Default: ayan-deaws-lab-600743178533
  FaissMetadataPrefix:
    Type: String
    Default: embeddings/faiss/

Resources:
  QueryableDocsLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3ReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetObject
                Resource:
                  - !Sub "arn:aws:s3:::${BucketName}"
                  - !Sub "arn:aws:s3:::${BucketName}/*"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  QueryableDocsLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: rag-queryable-docs
      Runtime: python3.9
      Handler: lambda_function.lambda_handler
      Role: !GetAtt QueryableDocsLambdaRole.Arn
      Timeout: 15
      Environment:
        Variables:
          BUCKET_NAME: !Ref BucketName
          FAISS_METADATA_PREFIX: !Ref FaissMetadataPrefix
      Code:
        # Assuming SAM build/deploy or simple zip upload
        S3Bucket: !Ref BucketName
        S3Key: lambda-deploy/queryable_documents.zip

Outputs:
  LambdaArn:
    Value: !GetAtt QueryableDocsLambda.Arn
    Export:
      Name: QueryableDocsLambdaArn
