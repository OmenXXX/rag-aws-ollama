AWSTemplateFormatVersion: "2010-09-09"

# Description of this CloudFormation stack.
# This stack creates a Lambda function that reads queryable PDF metadata
# from the existing S3 bucket.
Description: "Lambda for fetching queryable RAG PDFs from existing S3 FAISS metadata"

# Parameters make the template reusable.
# Instead of hardcoding everything everywhere, values can be passed during deployment.
Parameters:
  ExistingBucketName:
    Type: String
    Default: "ayan-deaws-lab-600743178533"
    # Existing S3 bucket where our RAG outputs are already stored.
    # CloudFormation will NOT create this bucket.
    # It will only give Lambda permission to read from it.

  FaissMetadataPrefix:
    Type: String
    Default: "embeddings/faiss/"
    # Prefix inside S3 where FAISS metadata JSON files are stored.
    # Example:
    # embeddings/faiss/Ayan_Mukhi_CV.metadata.json

  LambdaFunctionName:
    Type: String
    Default: "rag-queryable-documents-lambda"
    # Name of the Lambda function that CloudFormation will create.

  LambdaRoleName:
    Type: String
    Default: "RagQueryableDocsLambdaRole"
    # Name of the IAM role used by the Lambda function.

Resources:
  # IAM Role for Lambda.
  # Lambda cannot access S3 by itself.
  # This role gives Lambda permission to write logs and read specific S3 objects.
  QueryableDocsLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref LambdaRoleName

      # Trust policy.
      # This says: "Lambda service is allowed to assume this role."
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole

      # Inline permissions policy for this role.
      Policies:
        - PolicyName: "QueryableDocsLambdaPolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Permission for Lambda to write logs to CloudWatch.
              # Without this, we cannot see Lambda logs/debug output.
              - Sid: AllowCloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

              # Permission to list objects in the existing S3 bucket,
              # but only under the embeddings/faiss/ prefix.
              - Sid: AllowListFaissMetadataPrefix
                Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${ExistingBucketName}"
                Condition:
                  StringLike:
                    s3:prefix:
                      - !Sub "${FaissMetadataPrefix}*"

              # Permission to read metadata files from S3.
              # This allows Lambda to read:
              # s3://bucket/embeddings/faiss/*.metadata.json
              - Sid: AllowReadFaissMetadataFiles
                Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub "arn:aws:s3:::${ExistingBucketName}/${FaissMetadataPrefix}*"

  # CloudWatch Log Group for Lambda.
  # This keeps Lambda logs for 7 days only, useful for cost control in POC.
  QueryableDocsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${LambdaFunctionName}"
      RetentionInDays: 7

  # Actual Lambda function.
  # This Lambda reads S3 FAISS metadata files and returns the list of queryable PDFs.
  QueryableDocsLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt QueryableDocsLambdaRole.Arn
      Timeout: 30
      MemorySize: 256

      # Environment variables available inside Lambda code.
      # This avoids hardcoding bucket/prefix directly inside Python logic.
      Environment:
        Variables:
          BUCKET_NAME: !Ref ExistingBucketName
          FAISS_METADATA_PREFIX: !Ref FaissMetadataPrefix

      # Inline Lambda code.
      # For small Lambda functions, CloudFormation can create the code directly.
      # For bigger projects, we would package code as a ZIP and upload to S3.
      Code:
        ZipFile: |
          import json
          import os
          import traceback
          import boto3

          # Create S3 client using Lambda's IAM role permissions.
          s3 = boto3.client("s3")

          # Read configuration from environment variables.
          BUCKET_NAME = os.environ.get("BUCKET_NAME", "ayan-deaws-lab-600743178533")
          FAISS_METADATA_PREFIX = os.environ.get("FAISS_METADATA_PREFIX", "embeddings/faiss/")

          # CORS headers allow browser-based frontend to call this API.
          CORS_HEADERS = {
              "Content-Type": "application/json",
              "Access-Control-Allow-Origin": "*",
              "Access-Control-Allow-Methods": "GET,OPTIONS",
              "Access-Control-Allow-Headers": "Content-Type"
          }

          def make_response(status_code, body):
              return {
                  "statusCode": status_code,
                  "headers": CORS_HEADERS,
                  "body": json.dumps(body)
              }

          def get_http_method(event):
              # Supports both API Gateway HTTP API v2 and older REST-style events.
              return (
                  event.get("requestContext", {})
                       .get("http", {})
                       .get("method")
                  or event.get("httpMethod")
                  or "GET"
              )

          def list_metadata_objects():
              # Lists all .metadata.json files under embeddings/faiss/.
              # Handles pagination in case there are many files.
              objects = []
              continuation_token = None

              while True:
                  kwargs = {
                      "Bucket": BUCKET_NAME,
                      "Prefix": FAISS_METADATA_PREFIX
                  }

                  if continuation_token:
                      kwargs["ContinuationToken"] = continuation_token

                  result = s3.list_objects_v2(**kwargs)

                  for obj in result.get("Contents", []):
                      key = obj.get("Key", "")
                      if key.endswith(".metadata.json"):
                          objects.append({
                              "Key": key,
                              "LastModified": obj.get("LastModified")
                          })

                  if not result.get("IsTruncated"):
                      break

                  continuation_token = result.get("NextContinuationToken")

              # Latest processed documents first.
              objects.sort(key=lambda x: x.get("LastModified"), reverse=True)
              return objects

          def read_metadata_file(key):
              # Reads one metadata JSON file from S3.
              obj = s3.get_object(Bucket=BUCKET_NAME, Key=key)
              raw = obj["Body"].read().decode("utf-8")
              data = json.loads(raw)

              filename = key.split("/")[-1]
              doc_name = filename.replace(".metadata.json", "")

              # Return same shape as the EC2 FastAPI /documents/queryable endpoint.
              return {
                  "doc_name": data.get("doc_name") or doc_name,
                  "source_key": data.get("source_key"),
                  "source_version_id": data.get("source_version_id"),
                  "chunk_count": data.get("chunk_count"),
                  "embedding_model": data.get("embedding_model"),
                  "chunks_s3_key": data.get("chunks_s3_key"),
                  "faiss_index_s3_key": data.get("faiss_index_s3_key") or key.replace(".metadata.json", ".index"),
                  "metadata_s3_key": key,
                  "created_at": data.get("created_at"),
                  "status": data.get("status") or data.get("rag_status") or "queryable"
              }

          def lambda_handler(event, context):
              method = get_http_method(event)

              # Browser may send OPTIONS request for CORS preflight.
              if method == "OPTIONS":
                  return make_response(204, {})

              try:
                  metadata_objects = list_metadata_objects()
                  docs = []

                  for item in metadata_objects:
                      try:
                          docs.append(read_metadata_file(item["Key"]))
                      except Exception as file_error:
                          print(f"Failed to read metadata file {item['Key']}: {file_error}")

                  return make_response(200, docs)

              except Exception:
                  print("Unhandled error:")
                  print(traceback.format_exc())
                  return make_response(500, {
                      "error": "Failed to fetch queryable documents"
                  })

# Outputs are useful values printed after stack creation.
# Other stacks or humans can use these values.
Outputs:
  LambdaFunctionName:
    Description: "Queryable documents Lambda function name"
    Value: !Ref QueryableDocsLambda

  LambdaFunctionArn:
    Description: "Queryable documents Lambda ARN"
    Value: !GetAtt QueryableDocsLambda.Arn

  LambdaRoleArn:
    Description: "Lambda IAM role ARN"
    Value: !GetAtt QueryableDocsLambdaRole.Arn
