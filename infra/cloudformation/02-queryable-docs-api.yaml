AWSTemplateFormatVersion: '2010-09-09'
Description: 'API Gateway stack for RAG queryable documents'

Resources:
  QueryableDocsApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: rag-queryable-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - OPTIONS
        AllowHeaders:
          - Content-Type

  QueryableDocsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref QueryableDocsApi
      IntegrationType: AWS_PROXY
      IntegrationUri:
        Fn::ImportValue: QueryableDocsLambdaArn
      PayloadFormatVersion: '2.0'

  QueryableDocsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref QueryableDocsApi
      RouteKey: 'GET /documents/queryable'
      Target: !Join [ '/', [ 'integrations', !Ref QueryableDocsIntegration ] ]

  QueryableDocsStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref QueryableDocsApi
      StageName: '$default'
      AutoDeploy: true

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName:
        Fn::ImportValue: QueryableDocsLambdaArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${QueryableDocsApi}/*/*/documents/queryable"

Outputs:
  ApiEndpoint:
    Value: !Sub "https://${QueryableDocsApi}.execute-api.${AWS::Region}.amazonaws.com/documents/queryable"
