AWSTemplateFormatVersion: "2010-09-09"

# This stack creates the API Gateway endpoint in front of the Lambda.
# It does NOT create the Lambda.
# It assumes the Lambda already exists from 01-queryable-docs-lambda.yaml.
Description: "API Gateway endpoint for queryable RAG PDFs Lambda"

Parameters:
  ApiName:
    Type: String
    Default: "rag-queryable-documents-api"
    Description: "Name of the API Gateway HTTP API."

  LambdaFunctionName:
    Type: String
    Default: "rag-queryable-documents-lambda"
    Description: "Existing Lambda function that API Gateway will invoke."

Resources:
  # ============================================================
  # HTTP API Gateway
  # ============================================================
  # HTTP API is simpler and cheaper than REST API for this POC.
  # It exposes a public endpoint like:
  # https://xxxx.execute-api.ap-south-2.amazonaws.com/documents/queryable
  QueryableDocumentsHttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Ref ApiName
      ProtocolType: HTTP

      # CORS is enabled so a browser-based UI can call the API if needed.
      # In our current setup, Gradio server calls this from EC2 Python,
      # but CORS is still useful for future frontend/browser calls.
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - OPTIONS
        AllowHeaders:
          - Content-Type

  # ============================================================
  # API Gateway → Lambda Integration
  # ============================================================
  # This tells API Gateway where to send the request.
  # AWS_PROXY means API Gateway forwards request details to Lambda,
  # and Lambda returns an API Gateway-compatible response.
  QueryableDocumentsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref QueryableDocumentsHttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${LambdaFunctionName}"
      PayloadFormatVersion: "2.0"

  # ============================================================
  # API Route
  # ============================================================
  # This creates the route:
  # GET /documents/queryable
  #
  # When someone calls this URL, API Gateway invokes the Lambda.
  QueryableDocumentsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref QueryableDocumentsHttpApi
      RouteKey: "GET /documents/queryable"
      Target: !Sub "integrations/${QueryableDocumentsIntegration}"

  # ============================================================
  # Default Stage
  # ============================================================
  # "$default" means the final URL does not require /dev or /prod.
  # AutoDeploy means changes to routes/integration are automatically deployed.
  QueryableDocumentsStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref QueryableDocumentsHttpApi
      StageName: "$default"
      AutoDeploy: true

  # ============================================================
  # Lambda Invoke Permission
  # ============================================================
  # API Gateway is a separate AWS service.
  # Even though the API route points to Lambda, Lambda must explicitly allow
  # API Gateway to invoke it.
  QueryableDocumentsLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${QueryableDocumentsHttpApi}/*/*"

Outputs:
  ApiId:
    Description: "API Gateway HTTP API ID."
    Value: !Ref QueryableDocumentsHttpApi

  # This is the URL we pass to Gradio using QUERYABLE_API_URL.
  QueryableDocumentsUrl:
    Description: "Final queryable documents API endpoint."
    Value: !Sub "https://${QueryableDocumentsHttpApi}.execute-api.${AWS::Region}.amazonaws.com/documents/queryable"