AWSTemplateFormatVersion: "2010-09-09"

# This stack creates a public HTTP API endpoint:
# GET /documents/queryable
# That endpoint invokes the Lambda from the first stack.
Description: "API Gateway endpoint for queryable RAG PDFs Lambda"

Parameters:
  LambdaFunctionName:
    Type: String
    Default: "rag-queryable-documents-lambda"
    # Existing Lambda function name created by the first stack.
    # This stack does not recreate Lambda.

  ApiName:
    Type: String
    Default: "rag-queryable-documents-api"
    # Name of the API Gateway HTTP API.

Resources:
  # Creates an HTTP API Gateway.
  # HTTP API is simpler and cheaper than REST API Gateway for this use case.
  QueryableDocumentsHttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Ref ApiName
      ProtocolType: HTTP

      # CORS allows browser-based frontend to call this API.
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - OPTIONS
        AllowHeaders:
          - Content-Type

  # Integration connects API Gateway to Lambda.
  # AWS_PROXY means API Gateway passes request details directly to Lambda
  # and expects Lambda to return API-style response.
  QueryableDocumentsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref QueryableDocumentsHttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${LambdaFunctionName}"
      PayloadFormatVersion: "2.0"

  # Route defines the URL path and HTTP method.
  # This creates:
  # GET /documents/queryable
  QueryableDocumentsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref QueryableDocumentsHttpApi
      RouteKey: "GET /documents/queryable"
      Target: !Sub "integrations/${QueryableDocumentsIntegration}"

  # Stage exposes/deploys the API.
  # "$default" means the final URL does not need /prod or /dev.
  # AutoDeploy means route changes are automatically deployed.
  QueryableDocumentsStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref QueryableDocumentsHttpApi
      StageName: "$default"
      AutoDeploy: true

  # Permission allowing API Gateway to invoke the Lambda function.
  # Without this, API Gateway would exist but calls would fail with permission error.
  QueryableDocumentsLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${QueryableDocumentsHttpApi}/*/*"

Outputs:
  # API Gateway ID.
  ApiId:
    Description: "API Gateway ID"
    Value: !Ref QueryableDocumentsHttpApi

  # Final endpoint used by Gradio.
  # Example:
  # https://lvr37bxja1.execute-api.ap-south-2.amazonaws.com/documents/queryable
  QueryableDocumentsUrl:
    Description: "Queryable documents endpoint"
    Value: !Sub "https://${QueryableDocumentsHttpApi}.execute-api.${AWS::Region}.amazonaws.com/documents/queryable"
